<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student details</title>
<link rel="stylesheet" type="text/css" th:href="@{/style.css}">
</head>
<body>
	<h1>Student details</h1>

	<table border="1">
		<thead>
			<tr>
				<th>Roll</th>
				<th>Name</th>
				<th>Branch</th>
				<th>YOP</th>
				<th>CGPA</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="st:${studentList}">
				<td th:text="${st.roll}"></td>
				<td th:text="${st.name}"></td>
				<td th:text="${st.branch}"></td>
				<td th:text="${st.yop}"></td>
				<td th:text="${st.cgpa}"></td>
		</tbody>
	</table>

</body>
</html>
