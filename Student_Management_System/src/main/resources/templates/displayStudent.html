<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student details</title>
<link rel="stylesheet" type="text/css" th:href="@{/style.css}">
</head>
<body>
	<h1>Student details</h1>

	<h3>Student Roll :</h3>
	<p th:text="${student.roll}"></p>
	<h3>Student Name:</h3>
	<p th:text="${student.name}"></p>
	<h3>Student Branch:</h3>
	<p th:text="${student.branch}"></p>
	<h3>Student YOP:</h3>
	<p th:text="${student.yop}"></p>
	<h3>Student CGPA:</h3>
	<p th:text="${student.cgpa}"></p>
</body>
</html>
